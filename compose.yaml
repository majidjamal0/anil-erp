name: anil-erp

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend-vendor:/var/www/backend/vendor
    environment:
      APP_NAME: Anil ERP
      APP_ENV: local
      APP_KEY: ${APP_KEY:-base64:YW5pbC1sb2NhbC1vbmx5LWtleS0zMi1ieXRlcy0wMDA=}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://localhost
      APP_LOCALE: fa
      APP_FALLBACK_LOCALE: en
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-anil_erp}
      DB_USERNAME: ${POSTGRES_USER:-anil}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:5173
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    working_dir: /var/www/backend
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./backend:/var/www/backend
      - backend-vendor:/var/www/backend/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY:-base64:YW5pbC1sb2NhbC1vbmx5LWtleS0zMi1ieXRlcy0wMDA=}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${POSTGRES_DB:-anil_erp}
      DB_USERNAME: ${POSTGRES_USER:-anil}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anil_erp}
      POSTGRES_USER: ${POSTGRES_USER:-anil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  backend-vendor:
  frontend-node-modules:
  postgres-data:
  redis-data:
