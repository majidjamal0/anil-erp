name: anil-erp
services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["${APP_PORT:-80}:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_started }
  backend:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    working_dir: /var/www/backend
    volumes: ["./backend:/var/www/backend"]
    env_file: ["./backend/.env"]
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes: ["./frontend:/app"]
    ports: ["${FRONTEND_PORT:-5173}:5173"]
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anil_erp}
      POSTGRES_USER: ${POSTGRES_USER:-anil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres-data:
  redis-data:
